<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Access - Senja Manja #9</title>
  <style>
    :root{
      --bg:#061524;
      --card:#0d2438;
      --line:#2c4862;
      --text:#eaf4ff;
      --muted:#9fc0d8;
      --gold:#d6b969;
      --green:#2ed08d;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:radial-gradient(circle at 20% 15%, rgba(46,208,141,.18), transparent 35%), linear-gradient(160deg, #05101a 0%, #092038 100%);
      color:var(--text);
      font-family:Inter, Arial, sans-serif;
      padding:18px;
    }
    .card{
      width:min(640px,100%);
      border:1px solid var(--line);
      border-radius:18px;
      background:rgba(13,36,56,.82);
      padding:24px;
      box-shadow:0 24px 42px rgba(0,0,0,.36);
    }
    h1{margin:0 0 10px;font-size:26px;color:#f8f2df}
    p{margin:0 0 10px;color:var(--muted);line-height:1.6}
    .tag{
      display:inline-block;
      margin-bottom:14px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(214,185,105,.45);
      color:#ffe9ab;
      background:rgba(214,185,105,.16);
      font-size:12px;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.5px;
    }
    a{
      display:inline-block;
      margin-top:10px;
      text-decoration:none;
      color:#d7ffe9;
      border:1px solid rgba(46,208,141,.5);
      background:rgba(46,208,141,.16);
      border-radius:12px;
      padding:11px 14px;
      font-weight:700;
    }
    code{
      background:rgba(6,20,30,.8);
      border:1px solid rgba(159,192,216,.3);
      border-radius:8px;
      padding:2px 6px;
      color:#dbebff;
    }
  </style>
</head>
<body>
  <main class="card">
    <span class="tag">Admin Gateway</span>
    <h1>Admin management moved to dashboard</h1>
    <p>
      Edit, delete, and add financial records directly in the main dashboard using admin mode.
    </p>
    <p>
      Open this URL: <code>index.html?admin=1</code>
    </p>
    <a href="./index.html?admin=1">Open Admin Mode</a>
  </main>
</body>
</html>
